<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Icon background rounded square -->
  <rect width="72" height="72" rx="18" fill="url(#iconGrad)"/>

  <!-- Route arc (dashed) -->
  <path d="M13 48 C19 48 19 22 36 22 C53 22 53 48 59 48"
        stroke="white" stroke-opacity="0.2" stroke-width="2"
        stroke-dasharray="4 3" fill="none" stroke-linecap="round"/>

  <!-- GPS Pin -->
  <circle cx="36" cy="17" r="5" fill="#60A5FA"/>
  <path d="M36 23.5 L33 18 Q36 14.5 39 18 Z" fill="#60A5FA"/>
  <circle cx="36" cy="17" r="2.2" fill="white"/>

  <!-- Truck body -->
  <rect x="19" y="33" width="24" height="14" rx="3" fill="white" fill-opacity="0.92"/>

  <!-- Truck cab -->
  <path d="M43 39 L43 33 L50 33 L53 38.5 L53 47 L43 47 Z" fill="white" fill-opacity="0.92"/>

  <!-- Cab window -->
  <path d="M44.5 34.5 L44.5 37.5 L51 37.5 L49 34.5 Z" fill="#1E40AF" fill-opacity="0.45"/>

  <!-- Wheels -->
  <circle cx="26" cy="48" r="4" fill="#1E3A8A" stroke="white" stroke-width="1.5"/>
  <circle cx="26" cy="48" r="1.8" fill="#93C5FD"/>
  <circle cx="47" cy="48" r="4" fill="#1E3A8A" stroke="white" stroke-width="1.5"/>
  <circle cx="47" cy="48" r="1.8" fill="#93C5FD"/>

  <!-- Speed lines -->
  <line x1="10" y1="39" x2="17" y2="39" stroke="white" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="43" x2="17" y2="43" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wordmark H2H -->
  <text x="88" y="34" font-family="-apple-system, system-ui, BlinkMacSystemFont, sans-serif"
        font-size="30" font-weight="800" fill="#1E3A8A" letter-spacing="-1">H2H</text>

  <!-- Divider line -->
  <line x1="88" y1="42" x2="248" y2="42" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Wordmark FLEET -->
  <text x="92" y="60" font-family="-apple-system, system-ui, BlinkMacSystemFont, sans-serif"
        font-size="16" font-weight="700" fill="#2563EB" letter-spacing="5">FLEET</text>

  <!-- Dot accent before FLEET -->
  <circle cx="88" cy="57" r="3" fill="#3B82F6"/>
</svg>

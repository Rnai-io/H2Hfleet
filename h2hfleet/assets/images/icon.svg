<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="60%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="1024" height="512" rx="230" fill="url(#shine)"/>

  <!-- Route arc dashed -->
  <path d="M180 680 C280 680 280 300 512 300 C744 300 744 680 844 680"
        stroke="white" stroke-opacity="0.18" stroke-width="28"
        stroke-dasharray="50 35" fill="none" stroke-linecap="round"/>

  <!-- GPS Pin drop shadow -->
  <ellipse cx="512" cy="298" rx="36" ry="12" fill="#000" fill-opacity="0.15"/>

  <!-- GPS Pin body -->
  <circle cx="512" cy="235" r="72" fill="#60A5FA"/>
  <circle cx="512" cy="235" r="72" fill="white" fill-opacity="0.15"/>
  <!-- Pin tip -->
  <path d="M512 320 L468 252 Q512 200 556 252 Z" fill="#60A5FA"/>
  <!-- Pin inner dot -->
  <circle cx="512" cy="235" r="30" fill="white"/>
  <circle cx="512" cy="235" r="16" fill="#1D4ED8"/>

  <!-- Truck body -->
  <rect x="240" y="470" width="350" height="195" rx="36" fill="white" fill-opacity="0.95"/>

  <!-- Truck cab -->
  <path d="M590 540 L590 470 L730 470 L790 560 L790 665 L590 665 Z" fill="white" fill-opacity="0.95"/>

  <!-- Cab window -->
  <path d="M608 492 L608 548 L772 548 L730 492 Z" fill="#1E40AF" fill-opacity="0.4"/>
  <!-- Window glare -->
  <path d="M612 496 L612 530 L680 530 L660 496 Z" fill="white" fill-opacity="0.25"/>

  <!-- Truck grill -->
  <rect x="770" y="580" width="22" height="60" rx="6" fill="#93C5FD" fill-opacity="0.6"/>

  <!-- Wheels -->
  <circle cx="330" cy="668" r="62" fill="#1E3A8A"/>
  <circle cx="330" cy="668" r="62" stroke="white" stroke-width="18" fill="none"/>
  <circle cx="330" cy="668" r="24" fill="#93C5FD"/>
  <circle cx="680" cy="668" r="62" fill="#1E3A8A"/>
  <circle cx="680" cy="668" r="62" stroke="white" stroke-width="18" fill="none"/>
  <circle cx="680" cy="668" r="24" fill="#93C5FD"/>

  <!-- Speed lines -->
  <line x1="130" y1="560" x2="230" y2="560" stroke="white" stroke-opacity="0.55" stroke-width="24" stroke-linecap="round"/>
  <line x1="150" y1="620" x2="230" y2="620" stroke="white" stroke-opacity="0.35" stroke-width="18" stroke-linecap="round"/>
  <line x1="170" y1="670" x2="230" y2="670" stroke="white" stroke-opacity="0.2" stroke-width="14" stroke-linecap="round"/>

  <!-- Bottom label H2H -->
  <text x="512" y="870" font-family="-apple-system, system-ui, sans-serif"
        font-size="130" font-weight="800" fill="white" fill-opacity="0.25"
        text-anchor="middle" letter-spacing="-4">H2H</text>
</svg>

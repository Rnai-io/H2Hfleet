name: h2hfleet
description: Fleet Intelligence for Thai SMEs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0

  # Supabase
  supabase_flutter: ^2.3.0

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2

  # Date & Time
  intl: ^0.20.2

  # HTTP & API
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS / Location
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.svg
    - assets/images/logo_white.svg
    - assets/images/app_icon.png

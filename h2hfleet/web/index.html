  <link rel="manifest" href="manifest.json">

  <style>
    /* Branded loading splash shown until Flutter renders its first frame */
    #h2h-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1E3A8A 0%, #1E40AF 55%, #2563EB 100%);
      color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Thai', sans-serif;
      transition: opacity .45s ease; gap: 22px;
    }
    #h2h-splash.hide { opacity: 0; pointer-events: none; }
    #h2h-splash .brand { display: flex; align-items: center; gap: 12px; font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
    #h2h-splash .brand .truck { font-size: 38px; }
    #h2h-splash .tag { font-size: 14px; color: rgba(255,255,255,.82); font-weight: 500; }
    #h2h-splash .spinner {
      width: 34px; height: 34px; margin-top: 6px;
      border: 3px solid rgba(255,255,255,.25); border-top-color: #fff;
      border-radius: 50%; animation: h2hspin .8s linear infinite;
    }
    @keyframes h2hspin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="h2h-splash">
    <div class="brand"><span class="truck">🚛</span><span>H2HFleet</span></div>
    <div class="tag">ระบบบริหารฟลีตอัจฉริยะ · กำลังเริ่มต้น…</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Remove the splash once Flutter paints its first frame (with a safety fallback).
    function h2hHideSplash() {
      var s = document.getElementById('h2h-splash');
      if (s) { s.classList.add('hide'); setTimeout(function () { if (s) s.remove(); }, 500); }
    }
    window.addEventListener('flutter-first-frame', h2hHideSplash);
    setTimeout(h2hHideSplash, 12000); // fallback: never leave the splash stuck
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
